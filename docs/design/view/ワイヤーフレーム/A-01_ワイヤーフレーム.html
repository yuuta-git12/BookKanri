<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>書籍管理アプリ — ワイヤーフレーム</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: { 800: '#1e293b', 900: '#0f172a' }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="docs/design/view/ワイヤーフレーム/common.css">
</head>
<body class="bg-gray-50 font-sans text-gray-900 p-8 space-y-12">

  <!-- ===== タイトル ===== -->
  <div class="text-center">
    <h1 class="text-2xl font-bold text-slate-800 mb-1">管理メニュー画面 (A-01) — ワイヤーフレーム</h1>
    <p class="text-sm text-gray-400">対象ロール: 管理者</p>
  </div>

  <!-- ========================================
       パターン1: 通常状態
  ======================================== -->
  <div>
    <p class="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-2">パターン1 — 通常状態</p>
    <div class="bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm">

      <nav class="bg-slate-800 flex items-center justify-between px-5 h-11">
        <span class="text-slate-100 text-sm font-medium flex items-center gap-1.5">📚 My本棚 <span class="text-xs bg-red-500 text-white px-1.5 py-0.5 rounded-full ml-1">管理者</span></span>
        <div class="flex items-center gap-2">
          <div class="w-6 h-6 rounded-full bg-red-500 flex items-center justify-center text-white text-xs font-medium">管</div>
          <span class="text-slate-200 text-xs">admin</span>
          <button class="text-slate-400 text-xs hover:text-slate-200 ml-2">ログアウト</button>
        </div>
      </nav>

      <div class="min-h-64 flex items-center justify-center py-16 bg-gray-50">
        <div class="w-full max-w-xl px-6">

          <div class="text-center mb-8">
            <h2 class="text-lg font-semibold text-gray-900">管理メニュー</h2>
            <p class="text-xs text-gray-400 mt-0.5">管理者向け機能を選択してください</p>
          </div>

          <!-- メニューカード -->
          <div class="grid grid-cols-2 gap-4">

            <!-- ユーザー管理 -->
            <button class="bg-white border border-gray-200 rounded-xl p-6 shadow-sm hover:shadow-md hover:border-slate-300 text-left transition group">
              <div class="w-10 h-10 bg-blue-100 rounded-lg flex items-center justify-center text-blue-600 text-xl mb-3 group-hover:bg-blue-200">👥</div>
              <h3 class="text-sm font-semibold text-gray-800 mb-1">ユーザー管理</h3>
              <p class="text-xs text-gray-400 leading-relaxed">利用ユーザーのアカウントを一覧表示・登録・編集・削除できます</p>
              <div class="mt-3 text-xs text-slate-600 font-medium">→ ユーザー一覧へ</div>
            </button>

            <!-- 書籍データ管理 -->
            <button class="bg-white border border-gray-200 rounded-xl p-6 shadow-sm hover:shadow-md hover:border-slate-300 text-left transition group">
              <div class="w-10 h-10 bg-green-100 rounded-lg flex items-center justify-center text-green-600 text-xl mb-3 group-hover:bg-green-200">📚</div>
              <h3 class="text-sm font-semibold text-gray-800 mb-1">書籍データ管理</h3>
              <p class="text-xs text-gray-400 leading-relaxed">全利用ユーザーの書籍データを一覧表示・編集・削除できます</p>
              <div class="mt-3 text-xs text-slate-600 font-medium">→ 全ユーザー書籍一覧へ</div>
            </button>

          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ========================================
       遷移メモ
  ======================================== -->
  <div class="bg-white border border-gray-100 rounded-xl p-5 shadow-sm">
    <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-widest mb-3">画面遷移メモ</h3>
    <div class="grid grid-cols-3 gap-4 text-xs text-gray-600">
      <div class="space-y-1.5">
        <p class="font-medium text-gray-700">遷移元</p>
        <p>← <span class="font-mono bg-gray-100 px-1 rounded">C-01</span> ログイン画面（管理者認証成功）</p>
      </div>
      <div class="space-y-1.5">
        <p class="font-medium text-gray-700">ユーザー管理</p>
        <p>→ <span class="font-mono bg-gray-100 px-1 rounded">A-02</span> ユーザー一覧画面</p>
      </div>
      <div class="space-y-1.5">
        <p class="font-medium text-gray-700">書籍データ管理</p>
        <p>→ <span class="font-mono bg-gray-100 px-1 rounded">A-05</span> 全ユーザー書籍一覧画面</p>
      </div>
    </div>
  </div>

</body>
</html>
